name: govflow-prod

# ── Usage ──────────────────────────────────────────────────────────────────
# 1. Copy .env.prod.example to .env.prod and fill in secrets.
# 2. docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# NOTE: `deploy.replicas` requires Docker Swarm mode or is honoured by some
# orchestration wrappers.  For plain Docker Compose, scale manually:
#   docker compose -f infra/docker-compose.prod.yml up --scale backend=2 --scale frontend=2
# ──────────────────────────────────────────────────────────────────────────

services:
  # ── GDB (Gremlin) ─────────────────────────────────────────────────────────
  gremlin:
    image: tinkerpop/gremlin-server:3.7.3
    restart: unless-stopped
    networks:
      - govflow-prod
    volumes:
      - ./gremlin-server/gremlin-server.yaml:/opt/gremlin-server/conf/gremlin-server-custom.yaml:ro
      - gremlinlogs:/opt/gremlin-server/logs
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp /opt/gremlin-server/conf/gremlin-server-custom.yaml \
           /opt/gremlin-server/conf/gremlin-server.yaml
        exec /opt/gremlin-server/bin/gremlin-server.sh \
             /opt/gremlin-server/conf/gremlin-server.yaml
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8182'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PostgreSQL / Hologres-compat ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - govflow-prod
    environment:
      POSTGRES_DB: govflow
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d govflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MinIO / OSS-compat ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    networks:
      - govflow-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: govflow-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - govflow-prod
    env_file: .env.prod
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    depends_on:
      gremlin:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Next.js standalone) ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://govflow.example.vn}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://govflow.example.vn}
    image: govflow-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - govflow-prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3100/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx reverse proxy + TLS termination ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - govflow-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs — generate or use Let's Encrypt/ACM before starting:
      #   mkdir -p infra/nginx/ssl && openssl req -x509 -nodes -days 365 \
      #     -newkey rsa:2048 -keyout infra/nginx/ssl/privkey.pem \
      #     -out infra/nginx/ssl/fullchain.pem -subj "/CN=govflow.example.vn"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
  gremlinlogs:
    driver: local

# ── Isolated network ──────────────────────────────────────────────────────
networks:
  govflow-prod:
    driver: bridge
    name: govflow-prod
