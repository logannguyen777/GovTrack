user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    gzip on;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    upstream backend_pool { server backend:8100; keepalive 32; }
    upstream frontend_pool { server frontend:3100; keepalive 16; }

    map $http_upgrade $connection_upgrade { default upgrade; "" close; }

    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 50m;

        # Backend: /api/ws (WebSocket — NO strip, backend expects /api/ws)
        location = /api/ws {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Backend: /api/* with prefix stripped
        location ~ ^/api/(.*)$ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Backend-only endpoints (no /api prefix, direct routes)
        location = /healthz { proxy_pass http://backend_pool; proxy_set_header Host $host; }
        location = /metrics { proxy_pass http://backend_pool; proxy_set_header Host $host; }
        location /ws { 
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Everything else → frontend
        location / {
            proxy_pass http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }
    }
}
