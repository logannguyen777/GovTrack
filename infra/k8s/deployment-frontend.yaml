apiVersion: apps/v1
kind: Deployment
metadata:
  name: govflow-frontend
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: govflow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: govflow-frontend
        app.kubernetes.io/name: govflow
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: govflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3100
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3100"
          envFrom:
            - configMapRef:
                name: govflow-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
