apiVersion: v1
kind: ConfigMap
metadata:
  name: govflow-config
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
data:
  GOVFLOW_ENV: "cloud"
  # Comma-separated CORS origins — update to your real domain
  CORS_ORIGINS: "https://govflow.example.vn"
  # DashScope API base URL (OpenAI-compatible)
  DASHSCOPE_BASE_URL: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
  # Rate limiting defaults
  RATE_LIMIT_DEFAULT: "100/minute"
  # Log level
  LOG_LEVEL: "INFO"
  # Prometheus scrape allowlist (comma-separated CIDRs or IPs; empty = allow all)
  PROMETHEUS_ALLOW_IPS: ""
  # Demo mode off in production
  DEMO_MODE: "false"
  DEMO_CACHE_ENABLED: "false"
  # Frontend public endpoints — set matching NEXT_PUBLIC_* at build time via CI args
  NEXT_PUBLIC_API_URL: "https://govflow.example.vn"
  NEXT_PUBLIC_WS_URL: "wss://govflow.example.vn"
