# ── GovFlow Secrets ────────────────────────────────────────────────────────
#
# DO NOT commit real secret values to this file.
# This file is a placeholder only — actual secrets must be injected via:
#
#   kubectl create secret generic govflow-secrets \
#     --namespace govflow \
#     --from-env-file=.env.prod
#
# Or via Alibaba Cloud ACK Secret Manager integration:
#   https://www.alibabacloud.com/help/en/ack/ack-managed-and-ack-dedicated/user-guide/use-alibaba-cloud-secret-manager-to-manage-and-auto-rotate-kubernetes-secrets
#
# Required keys in .env.prod:
#   DASHSCOPE_API_KEY    — Alibaba Cloud Model Studio API key
#   GDB_ENDPOINT         — ws://gdb-instance:8182/gremlin
#   GDB_USERNAME
#   GDB_PASSWORD
#   HOLOGRES_DSN         — postgresql://user:pass@host:5432/govflow
#   OSS_ENDPOINT         — https://oss-ap-southeast-1.aliyuncs.com
#   OSS_ACCESS_KEY
#   OSS_SECRET_KEY
#   OSS_BUCKET
#   JWT_SECRET           — HS256 signing secret (min 32 chars)
#   POSTGRES_USER
#   POSTGRES_PASSWORD
#   MINIO_ROOT_USER
#   MINIO_ROOT_PASSWORD
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: govflow-secrets
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
type: Opaque
# stringData values are BASE64-encoded placeholders — replace or use kubectl create
stringData:
  DASHSCOPE_API_KEY: "REPLACE_ME"
  GDB_ENDPOINT: "REPLACE_ME"
  GDB_USERNAME: "REPLACE_ME"
  GDB_PASSWORD: "REPLACE_ME"
  HOLOGRES_DSN: "REPLACE_ME"
  OSS_ENDPOINT: "REPLACE_ME"
  OSS_ACCESS_KEY: "REPLACE_ME"
  OSS_SECRET_KEY: "REPLACE_ME"
  OSS_BUCKET: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
