---
apiVersion: v1
kind: Service
metadata:
  name: govflow-backend
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: govflow-backend
  ports:
    - name: http
      protocol: TCP
      port: 8100
      targetPort: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: govflow-frontend
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: govflow-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3100
      targetPort: 3100
