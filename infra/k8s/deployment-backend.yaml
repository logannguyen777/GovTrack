apiVersion: apps/v1
kind: Deployment
metadata:
  name: govflow-backend
  namespace: govflow
  labels:
    app.kubernetes.io/name: govflow
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: govflow-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: govflow-backend
        app.kubernetes.io/name: govflow
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8100"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          # Tag per-release: kubectl set image deployment/govflow-backend backend=govflow-backend:<sha>
          # Or update this field via CI: see .github/workflows/deploy-prod.yml
          image: govflow-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: govflow-config
            - secretRef:
                name: govflow-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8100
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
