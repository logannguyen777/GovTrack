name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + unit tests ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-24.04

    services:
      gremlin-server:
        image: tinkerpop/gremlin-server:3.7.3
        ports:
          - 8182:8182
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/8182'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: govflow
          POSTGRES_USER: govflow
          POSTGRES_PASSWORD: govflow_ci_2026
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U govflow -d govflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      GDB_ENDPOINT: ws://localhost:8182/gremlin
      GDB_USERNAME: ""
      GDB_PASSWORD: ""
      HOLOGRES_DSN: postgresql://govflow:govflow_ci_2026@localhost:5433/govflow
      JWT_SECRET: ci_test_secret_do_not_use_in_prod
      DASHSCOPE_API_KEY: dummy_ci_key
      OSS_ENDPOINT: http://localhost:9000
      OSS_ACCESS_KEY: minioadmin
      OSS_SECRET_KEY: minioadmin123
      OSS_BUCKET: govflow-ci
      GOVFLOW_ENV: ci
      DEMO_MODE: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend with dev extras
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install prometheus-fastapi-instrumentator
        run: pip install "prometheus-fastapi-instrumentator>=7.0.0"

      - name: Ruff lint
        working-directory: backend
        run: ruff check src/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check src/

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ \
            -m "not requires_dashscope and not integration and not benchmark" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Backend: type checking ──────────────────────────────────────────────────
  backend-type:
    name: Backend Type Check (mypy)
    runs-on: ubuntu-24.04
    continue-on-error: true   # Non-blocking for now — remove once types are clean

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend + mypy
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install mypy types-pyyaml types-aiofiles

      - name: Run mypy
        working-directory: backend
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-return-any \
            --show-error-codes \
            2>&1 | tee mypy-output.txt || true
          echo "mypy exit code: $?"

      - name: Upload mypy output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mypy-output
          path: backend/mypy-output.txt

  # ── Frontend: lint + type check + build ─────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8100
          NEXT_PUBLIC_WS_URL: ws://localhost:8100
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Upload build artifact (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone
          path: frontend/.next/standalone
          retention-days: 3

  # ── Secret scanning (Gitleaks) ───────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build + push (main branch only) ──────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-24.04
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/govflow-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/govflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://govflow.example.vn
            NEXT_PUBLIC_WS_URL=wss://govflow.example.vn
          tags: |
            ghcr.io/${{ github.repository }}/govflow-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/govflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
