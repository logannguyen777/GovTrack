name: E2E Tests (Playwright)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - "backend/**"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start local stack
        working-directory: infra
        run: |
          docker compose up -d --wait --timeout 120
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/healthz; then
              echo "Backend healthy"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          curl -sf http://localhost:8100/healthz || (echo "Backend did not start" && exit 1)

      - name: Seed demo data
        run: |
          if [ -f scripts/seed_demo.py ]; then
            python scripts/seed_demo.py
          elif [ -f scripts/start_demo.sh ]; then
            bash scripts/start_demo.sh --seed-only || true
          else
            echo "No seed script found — skipping"
          fi

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3100
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Tear down stack
        if: always()
        working-directory: infra
        run: docker compose down -v
